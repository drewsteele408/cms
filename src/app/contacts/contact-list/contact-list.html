<div class="row contact-list-wrapper">
    <div class="col-xs-12 col-sm-10 col-md-8">
        <div class="panel panel-default contact-panel">
            <div class="panel-heading clearfix">
                <h2 class="panel-title pull-left">Contacts</h2>
                <button class="btn btn-success btn-sm pull-right">New Contact</button>
            </div>
            <div class="panel-body">
                <app-contact-item *ngFor="let contact of contacts" [contact]="contact" (click)="onSelected(contact)"></app-contact-item>
            </div>
        </div>
    </div>
</div>
