<div class="panel panel-default document-detail-panel">
	<div class="panel-heading clearfix">
		<div class="pull-left detail-heading-content">
			<h3 class="panel-title">{{ document?.name }}</h3>
		</div>
		<div class="pull-right detail-actions">
			<a class="btn btn-primary btn-sm" (click)="onView()">View</a>
			<a class="btn btn-info btn-sm" [routerLink]="['/documents', document?.id, 'edit']">Edit</a>
			<a class="btn btn-danger btn-sm" (click)="onDelete()">Delete</a>
		</div>
	</div>

	<div class="panel-body">
		<p><strong>Description:</strong></p>
		<p>{{ document?.description }}</p>
		<p><strong>URL:</strong></p>
		<p>{{ document?.url }}</p>
	</div>
</div>
